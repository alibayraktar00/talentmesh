<!DOCTYPE html>
<html lang="tr">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TalentMesh - Takım Bul, Proje Yap">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="talentmesh">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>talentmesh</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Türkçe klavye desteği için:
    CanvasKit renderer bazen tarayıcının klavye olaylarını işlemesini engelleyebilir.
    Bu script, Türkçe karakterlerin (ş, ğ, ü, ö, ç, ı, İ) düzgün iletilmesini sağlar.
  -->
  <script>
    // Flutter CanvasKit'in Türkçe klavye girişini engellemesini önle.
    // Composition events (IME) ve key olaylarını Flutter'ın önüne geçmeden ilet.
    document.addEventListener('keydown', function(e) {
      // Türkçe özel karakterlerin key code'ları
      const turkishKeys = ['Dead', 'AltGraph'];
      if (turkishKeys.includes(e.key)) {
        // Bu olayların Flutter tarafından tüketilmesine izin ver ama
        // tarayıcı da işleme devam etsin
        e.stopImmediatePropagation && e.stopImmediatePropagation();
      }
    }, true);
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
